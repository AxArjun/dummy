# ─────────────────────────────────────────────────────────────────────────────
# FuelIQ — Docker Compose
# Full stack: API, Celery Worker, Celery Beat, PostgreSQL, Redis, MinIO, Nginx
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  fueliq_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_certs:
    driver: local

x-api-common: &api-common
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: runtime
  image: fueliq-api:latest
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - fueliq_net
  restart: unless-stopped

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fueliq_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fueliq}
      POSTGRES_USER: ${POSTGRES_USER:-fueliq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"  # Only expose to localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fueliq} -d ${POSTGRES_DB:-fueliq}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fueliq_net
    restart: unless-stopped
    shm_size: 256mb  # Shared memory for parallel queries
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1GB
        -c wal_level=replica
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=200
        -c log_checkpoints=on

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fueliq_redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fueliq_net
    restart: unless-stopped

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: fueliq_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SITE_REGION: us-east-1
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fueliq_net
    restart: unless-stopped

  # ── MinIO Init (create bucket on first run) ──────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: fueliq_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing minio/${MINIO_BUCKET:-fueliq};
        mc anonymous set private minio/${MINIO_BUCKET:-fueliq};
        echo 'MinIO bucket initialized';
      "
    networks:
      - fueliq_net

  # ── FastAPI Application ─────────────────────────────────────────────────────
  api:
    <<: *api-common
    container_name: fueliq_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      APP_ENV: production
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    <<: *api-common
    container_name: fueliq_worker
    command: >
      celery -A app.tasks.celery_app.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=reminders,notifications,analytics,maintenance
        --max-tasks-per-child=100
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    <<: *api-common
    container_name: fueliq_beat
    command: >
      celery -A app.tasks.celery_app.celery_app beat
        --loglevel=info
        --scheduler=celery.beat:PersistentScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    deploy:
      replicas: 1  # CRITICAL: Only ever run ONE beat instance
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fueliq_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fueliq_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Database Migration ──────────────────────────────────────────────────────
  # Run migrations before API starts (one-shot)
  migrate:
    <<: *api-common
    container_name: fueliq_migrate
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
